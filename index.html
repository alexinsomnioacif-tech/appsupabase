function ManzanaCard({m,ventas,onEdit,onDel}) {
  const vend = ventas.filter(v=>v.manzanaId===m.id).length;
  const total = m.totalLotes||0;
  const disp = Math.max(0,total-vend);
  const pct = total>0?Math.min(100,Math.round(vend/total*100)):0;
  const agot = total>0&&disp===0;
  return (
    <div style={{padding:'12px 14px',borderRadius:var_r,background:'var(--surface)',border:`1px solid ${agot?'#FECACA':'var(--border)'}`,marginBottom:8}}>
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:total>0?8:0}}>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:14,fontWeight:700}}>{m.nombre}</span>
          {agot&&<span className="badge badge-red">Agotada</span>}
        </div>
        <div style={{display:'flex',gap:2}}>
          <button className="btn-icon" onClick={onEdit}>{I.edit}</button>
          <button className="btn-icon danger" onClick={onDel}>{I.trash}</button>
        </div>
      </div>
      {total>0 ? (
        <>
          <div style={{display:'flex',gap:8,marginBottom:6,flexWrap:'wrap'}}>
            <span style={{fontSize:11,fontWeight:700,background:'var(--surface3)',color:'var(--ink2)',borderRadius:6,padding:'2px 7px'}}>Total: {total}</span>
            <span style={{fontSize:11,fontWeight:700,background:'var(--green-lt)',color:'var(--green)',borderRadius:6,padding:'2px 7px'}}>Disp: {disp}</span>
            <span style={{fontSize:11,fontWeight:700,background:'var(--orange-lt)',color:'var(--orange)',borderRadius:6,padding:'2px 7px'}}>Vend: {vend}</span>
          </div>
          <div className="lot-bar"><div className="lot-fill" style={{width:pct+'%',background:agot?'var(--red)':'var(--orange)'}}/></div>
          <div style={{display:'flex',justifyContent:'space-between',fontSize:10,color:'var(--ink4)',marginTop:3}}>
            <span>0</span>
            <span style={{color:pct>=90?'var(--red)':'var(--ink4)',fontWeight:pct>=90?700:400}}>{pct}% vendido</span>
            <span>{total}</span>
          </div>
        </>
      ):(
        <p style={{fontSize:11,color:'var(--ink4)',fontStyle:'italic',margin:0}}>Sin total configurado — edita para agregar</p>
      )}
    </div>
  );
}

function ConfigProyectos() {
  const [proyectos,setProyectos]=useState([]);
  const [etapas,setEtapas]=useState([]);
  const [manzanas,setManzanas]=useState([]);
  const [ventas,setVentas]=useState([]);
  const [selProy,setSelProy]=useState(null);
  const [selEtapa,setSelEtapa]=useState(null);
  const [modal,setModal]=useState(null);
  const [form,setForm]=useState({nombre:'',activa:true,totalLotes:''});
  const [editId,setEditId]=useState(null);
  const [mStep,setMStep]=useState(0); // mobile drill

  const load = async ()=>{
    setProyectos(await db.proyectos.toArray());
    setEtapas(await db.etapas.toArray());
    setManzanas(await db.manzanas.toArray());
    setVentas(await db.ventas.toArray());
  };
  useEffect(()=>{load();},[]);

  const etapasDe = selProy?etapas.filter(e=>e.proyectoId===selProy.id):[];
  const manzanasDe = selEtapa?manzanas.filter(m=>m.etapaId===selEtapa.id):[];

  const open = (type,edit=null) => {
    setModal(type); setEditId(edit?.id||null);
    setForm({nombre:edit?.nombre||'',activa:edit?.activa!==false,totalLotes:edit?.totalLotes||''});
  };

  const save = async () => {
    if(!form.nombre.trim()) return;
    if(modal==='proyecto'){
      if(editId) await db.proyectos.update(editId,{nombre:form.nombre});
      else await db.proyectos.add({nombre:form.nombre});
    } else if(modal==='etapa'){
      if(editId) await db.etapas.update(editId,{nombre:form.nombre,activa:!!form.activa});
      else await db.etapas.add({proyectoId:selProy.id,nombre:form.nombre,activa:!!form.activa});
    } else if(modal==='manzana'){
      const tl=parseInt(form.totalLotes)||0;
      if(editId) await db.manzanas.update(editId,{nombre:form.nombre,totalLotes:tl});
      else await db.manzanas.add({etapaId:selEtapa.id,nombre:form.nombre,totalLotes:tl});
    }
    setModal(null); load();
  };

  const del = async (type,id) => {
    if(!confirm('¿Eliminar?')) return;
    if(type==='proyecto'){await db.proyectos.delete(id);if(selProy?.id===id){setSelProy(null);setSelEtapa(null);setMStep(0);}}
    else if(type==='etapa'){await db.etapas.delete(id);if(selEtapa?.id===id){setSelEtapa(null);setMStep(1);}}
    else await db.manzanas.delete(id);
    load();
  };

  const toggleActiva = async e => { await db.etapas.update(e.id,{activa:!e.activa}); load(); };

  /* ── Shared column panel ── */
  const Panel = ({title,onAdd,children,onBack}) => (
    <div className="card" style={{padding:0,overflow:'hidden'}}>
      <div className="drill-head">
        {onBack&&<button className="btn-icon" onClick={onBack}>{I.back}</button>}
        <h3 style={{flex:1,fontSize:14}}>{title}</h3>
        {onAdd&&<button className="btn btn-primary" style={{padding:'5px 10px',fontSize:12,minHeight:30,gap:4}} onClick={onAdd}>{I.plus} Nuevo</button>}
      </div>
      <div className="drill-body">{children}</div>
    </div>
  );

  const PRow = ({item,isSel,onClick,onEdit,onDel,extra}) => (
    <div onClick={onClick} style={{display:'flex',alignItems:'center',gap:8,padding:'9px 10px',borderRadius:var_r,cursor:'pointer',minHeight:44,
      background:isSel?'var(--orange-lt)':'var(--surface3)',border:isSel?'1px solid var(--orange-md)':'1px solid transparent',transition:'all .1s'}}>
      <div style={{flex:1,minWidth:0}}>{extra||<span style={{fontSize:14,fontWeight:500,color:isSel?'var(--orange)':'var(--ink)'}}>{item.nombre}</span>}</div>
      <div style={{display:'flex',gap:2,flexShrink:0}} onClick={e=>e.stopPropagation()}>
        <button className="btn-icon" onClick={()=>onEdit()}>{I.edit}</button>
        <button className="btn-icon danger" onClick={()=>onDel()}>{I.trash}</button>
      </div>
    </div>
  );

  /* ── Desktop 3 columns ── */
  const Desktop = () => (
    <div className="proy-grid">
      <Panel title="Proyectos" onAdd={()=>open('proyecto')}>
        {proyectos.map(p=><PRow key={p.id} item={p} isSel={selProy?.id===p.id} onClick={()=>{setSelProy(p);setSelEtapa(null);}} onEdit={()=>open('proyecto',p)} onDel={()=>del('proyecto',p.id)}/>)}
        {proyectos.length===0&&<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin proyectos</p>}
      </Panel>

      <Panel title={selProy?`Etapas — ${selProy.nombre}`:'Etapas'} onAdd={selProy?()=>open('etapa'):null}>
        {!selProy?<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Selecciona un proyecto</p>
        :etapasDe.length===0?<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin etapas</p>
        :etapasDe.map(e=>(
          <PRow key={e.id} item={e} isSel={selEtapa?.id===e.id} onClick={()=>setSelEtapa(e)} onEdit={()=>open('etapa',e)} onDel={()=>del('etapa',e.id)}
            extra={<div style={{display:'flex',alignItems:'center',gap:8,flexWrap:'wrap'}}>
              <span style={{fontSize:14,fontWeight:500}}>{e.nombre}</span>
              <span className={`badge ${e.activa?'badge-green':'badge-gray'}`}>{e.activa?'Activa':'Inactiva'}</span>
              <label className="toggle" onClick={ev=>ev.stopPropagation()}>
                <input type="checkbox" checked={!!e.activa} onChange={()=>toggleActiva(e)}/>
                <div className="toggle-track"><div className="toggle-thumb"/></div>
              </label>
            </div>}
          />
        ))}
      </Panel>

      <Panel title={selEtapa?`Manzanas — ${selEtapa.nombre}`:'Manzanas'} onAdd={selEtapa?()=>open('manzana'):null}>
        {!selEtapa?<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Selecciona una etapa</p>
        :manzanasDe.length===0?<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin manzanas</p>
        :manzanasDe.map(m=><ManzanaCard key={m.id} m={m} ventas={ventas} onEdit={()=>open('manzana',m)} onDel={()=>del('manzana',m.id)}/>)
        }
      </Panel>
    </div>
  );

  /* ── Mobile drill-down ── */
  const Mobile = () => (
    <div>
      {/* Breadcrumb */}
      <div style={{display:'flex',alignItems:'center',gap:6,marginBottom:14,fontSize:13,flexWrap:'wrap'}}>
        <button onClick={()=>setMStep(0)} style={{background:'none',border:'none',cursor:'pointer',color:mStep===0?'var(--orange)':'var(--ink3)',fontWeight:mStep===0?700:400,fontFamily:'Plus Jakarta Sans',fontSize:13,padding:0}}>Proyectos</button>
        {mStep>=1&&<><span style={{color:'var(--ink4)'}}>/</span><button onClick={()=>setMStep(1)} style={{background:'none',border:'none',cursor:'pointer',color:mStep===1?'var(--orange)':'var(--ink3)',fontWeight:mStep===1?700:400,fontFamily:'Plus Jakarta Sans',fontSize:13,padding:0}}>{selProy?.nombre||'Etapas'}</button></>}
        {mStep>=2&&<><span style={{color:'var(--ink4)'}}>/</span><span style={{color:'var(--orange)',fontWeight:700,fontSize:13}}>{selEtapa?.nombre}</span></>}
      </div>

      {mStep===0&&(
        <Panel title="Proyectos" onAdd={()=>open('proyecto')}>
          {proyectos.map(p=>(
            <div key={p.id} style={{display:'flex',alignItems:'center',gap:10,padding:'10px 12px',borderRadius:var_r,background:'var(--surface3)',marginBottom:6,minHeight:48}}>
              <button onClick={()=>{setSelProy(p);setSelEtapa(null);setMStep(1);}} style={{flex:1,background:'none',border:'none',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:8,fontFamily:'Plus Jakarta Sans',fontSize:14,fontWeight:600,padding:0}}>
                {p.nombre} <span style={{color:'var(--ink4)'}}>{I.chevR}</span>
              </button>
              <button className="btn-icon" onClick={()=>open('proyecto',p)}>{I.edit}</button>
              <button className="btn-icon danger" onClick={()=>del('proyecto',p.id)}>{I.trash}</button>
            </div>
          ))}
          {proyectos.length===0&&<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin proyectos</p>}
        </Panel>
      )}
      {mStep===1&&selProy&&(
        <Panel title={`Etapas — ${selProy.nombre}`} onAdd={()=>open('etapa')} onBack={()=>setMStep(0)}>
          {etapasDe.map(e=>(
            <div key={e.id} style={{padding:'10px 12px',borderRadius:var_r,background:'var(--surface3)',marginBottom:6}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:4}}>
                <button onClick={()=>{setSelEtapa(e);setMStep(2);}} style={{flex:1,background:'none',border:'none',cursor:'pointer',textAlign:'left',display:'flex',alignItems:'center',gap:8,fontFamily:'Plus Jakarta Sans',fontSize:14,fontWeight:600,padding:0}}>
                  {e.nombre} <span className={`badge ${e.activa?'badge-green':'badge-gray'}`}>{e.activa?'Activa':'Inactiva'}</span> {I.chevR}
                </button>
                <label className="toggle" onClick={ev=>ev.stopPropagation()}>
                  <input type="checkbox" checked={!!e.activa} onChange={()=>toggleActiva(e)}/>
                  <div className="toggle-track"><div className="toggle-thumb"/></div>
                </label>
                <button className="btn-icon" onClick={()=>open('etapa',e)}>{I.edit}</button>
                <button className="btn-icon danger" onClick={()=>del('etapa',e.id)}>{I.trash}</button>
              </div>
            </div>
          ))}
          {etapasDe.length===0&&<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin etapas</p>}
        </Panel>
      )}
      {mStep===2&&selEtapa&&(
        <Panel title={`Manzanas — ${selEtapa.nombre}`} onAdd={()=>open('manzana')} onBack={()=>setMStep(1)}>
          {manzanasDe.map(m=><ManzanaCard key={m.id} m={m} ventas={ventas} onEdit={()=>open('manzana',m)} onDel={()=>del('manzana',m.id)}/>)}
          {manzanasDe.length===0&&<p style={{fontSize:13,color:'var(--ink3)',textAlign:'center',padding:'16px 0'}}>Sin manzanas</p>}
        </Panel>
      )}
    </div>
  );

  return (
    <div className="fade-up">
      <div className="proy-desktop"><Desktop/></div>
      <div className="proy-mobile"><Mobile/></div>

      {modal&&(
        <Modal title={(editId?'Editar ':'Nuevo/a ')+modal.charAt(0).toUpperCase()+modal.slice(1)} onClose={()=>setModal(null)}>
          <div className="field" style={{marginBottom:14}}>
            <label className="label">Nombre</label>
            <input className="input" value={form.nombre} onChange={e=>setForm(f=>({...f,nombre:e.target.value}))} placeholder={`Nombre de la/el ${modal}`} autoFocus onKeyDown={e=>e.key==='Enter'&&save()}/>
          </div>
          {modal==='etapa'&&(
            <div style={{display:'flex',alignItems:'center',gap:12,marginBottom:14,padding:'10px 12px',background:'var(--surface3)',borderRadius:var_r}}>
              <label className="toggle"><input type="checkbox" checked={!!form.activa} onChange={e=>setForm(f=>({...f,activa:e.target.checked}))}/><div className="toggle-track"><div className="toggle-thumb"/></div></label>
              <span style={{fontSize:14}}>Etapa activa</span>
            </div>
          )}
          {modal==='manzana'&&(
            <div className="field" style={{marginBottom:14}}>
              <label className="label">Total de lotes</label>
              <input type="number" min="0" inputMode="numeric" className="input" value={form.totalLotes} onChange={e=>setForm(f=>({...f,totalLotes:e.target.value}))} placeholder="Ej: 50"/>
              <span style={{fontSize:11,color:'var(--ink3)'}}>Define el máximo para validar registros</span>
            </div>
          )}
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" style={{flex:2}} onClick={save}>{I.check} Guardar</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   CONFIG — PINs
══════════════════════════════════════════ */
function ConfigPins({currentRol}) {
  const [pins,setPins]=useState({admin:'',asesor:''});
  const [modal,setModal]=useState(null); // 'admin'|'asesor'
  const [p1,setP1]=useState(['','','','','','']);
  const [p2,setP2]=useState(['','','','','','']);
  const [err,setErr]=useState('');
  const refs1=useRef([]), refs2=useRef([]);

  const load = async ()=>{
    const a=await db.config.get('admin_pin');
    const b=await db.config.get('asesor_pin');
    setPins({admin:a?.value||'',asesor:b?.value||''});
  };
  useEffect(()=>{load();},[]);

  const openModal = rol => { setModal(rol); setP1(['','','','','','']); setP2(['','','','','','']); setErr(''); };

  const handleDigit=(arr,setArr,refs,i,v)=>{
    if(!/^\d?$/.test(v)) return;
    const n=[...arr]; n[i]=v; setArr(n); setErr('');
    if(v&&i<5) setTimeout(()=>refs.current[i+1]?.focus(),10);
  };
  const handleKey=(arr,setArr,refs,i,e)=>{
    if(e.key==='Backspace'&&!arr[i]&&i>0){const n=[...arr];n[i-1]='';setArr(n);setTimeout(()=>refs.current[i-1]?.focus(),10);}
    if(e.key==='ArrowLeft'&&i>0) refs.current[i-1]?.focus();
    if(e.key==='ArrowRight'&&i<5) refs.current[i+1]?.focus();
  };

  const PinRow = ({arr,setArr,refs,label}) => (
    <div className="field" style={{marginBottom:14}}>
      <label className="label">{label}</label>
      <div style={{display:'flex',gap:8}}>
        {arr.map((v,i)=>(
          <input key={i} ref={el=>refs.current[i]=el} type="text" inputMode="numeric" maxLength={1}
            value={v} onChange={e=>handleDigit(arr,setArr,refs,i,e.target.value)}
            onKeyDown={e=>handleKey(arr,setArr,refs,i,e)} onFocus={e=>e.target.select()}
            style={{flex:1,height:44,border:`1.5px solid ${err?'var(--red)':'var(--border)'}`,borderRadius:var_r,textAlign:'center',fontFamily:'JetBrains Mono',fontSize:20,fontWeight:600,outline:'none',background:'var(--surface)',color:'var(--ink)',transition:'border-color .12s',WebkitAppearance:'none'}}
          />
        ))}
      </div>
    </div>
  );

  const save = async ()=>{
    const pin1=p1.join(''), pin2=p2.join('');
    if(pin1.length<6){setErr('El PIN debe tener 6 dígitos');return;}
    if(pin1!==pin2){setErr('Los PINs no coinciden');return;}
    // Check not same as other role
    const otherKey = modal==='admin'?'asesor_pin':'admin_pin';
    const other = await db.config.get(otherKey);
    if(other?.value===pin1){setErr('Este PIN ya lo usa el otro acceso');return;}
    await db.config.put({key:modal==='admin'?'admin_pin':'asesor_pin',value:pin1});
    setModal(null); load();
  };

  const roles=[{k:'admin',label:'Administrador',badge:'badge-orange'},{k:'asesor',label:'Asesor',badge:'badge-blue'}];

  return (
    <div className="fade-up" style={{maxWidth:480}}>
      <div style={{marginBottom:18}}>
        <h3>Accesos PIN</h3>
        <p style={{fontSize:13,color:'var(--ink3)',marginTop:4}}>PIN de 6 dígitos para cada rol. Clic en la llave para cambiar.</p>
      </div>
      <div className="info-box" style={{marginBottom:18}}>
        PINs por defecto — Administrador: <strong>111111</strong> · Asesor: <strong>000000</strong>
      </div>
      <div style={{display:'flex',flexDirection:'column',gap:10}}>
        {roles.map(r=>(
          <div key={r.k} style={{display:'flex',alignItems:'center',gap:12,padding:'14px 16px',borderRadius:var_r,border:`1px solid ${currentRol===r.k?'var(--orange-md)':'var(--border)'}`,background:currentRol===r.k?'var(--orange-lt)':'var(--surface)'}}>
            <div style={{width:40,height:40,borderRadius:10,background:r.badge==='badge-orange'?'var(--orange-lt)':'var(--blue-lt)',display:'flex',alignItems:'center',justifyContent:'center',color:r.badge==='badge-orange'?'var(--orange)':'var(--blue)',flexShrink:0}}>
              {r.k==='admin'?I.gear:I.user}
            </div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{display:'flex',alignItems:'center',gap:8,marginBottom:3}}>
                <span style={{fontWeight:700,fontSize:15}}>{r.label}</span>
                {currentRol===r.k&&<span className="badge badge-orange" style={{fontSize:10}}>Sesión activa</span>}
              </div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <span className={`badge ${r.badge}`}>{r.k==='admin'?'Admin':'Asesor'}</span>
                <span style={{fontFamily:'JetBrains Mono',fontSize:12,color:'var(--ink4)',letterSpacing:3}}>●●●●●●</span>
              </div>
            </div>
            <button className="btn-icon" style={{color:'var(--blue)',background:'var(--blue-lt)',borderRadius:10,width:38,height:38}} onClick={()=>openModal(r.k)} title="Cambiar PIN">{I.key}</button>
          </div>
        ))}
      </div>

      {modal&&(
        <Modal title={`Cambiar PIN — ${modal==='admin'?'Administrador':'Asesor'}`} onClose={()=>setModal(null)}>
          <PinRow arr={p1} setArr={setP1} refs={refs1} label="Nuevo PIN"/>
          <PinRow arr={p2} setArr={setP2} refs={refs2} label="Confirmar PIN"/>
          {err&&<div className="error-box" style={{marginBottom:14}}>{err}</div>}
          <div style={{display:'flex',gap:10}}>
            <button className="btn btn-ghost" style={{flex:1}} onClick={()=>setModal(null)}>Cancelar</button>
            <button className="btn btn-primary" style={{flex:2}} onClick={save}>{I.check} Guardar PIN</button>
          </div>
        </Modal>
      )}
    </div>
  );
}

/* ══════════════════════════════════════════
   CONFIGURACIÓN (tabs)
══════════════════════════════════════════ */
function Config({currentRol}) {
  const [tab,setTab]=useState('socios');
  const tabs=[
    {id:'socios',  label:'Socios',    icon:I.building},
    {id:'proyectos',label:'Proyectos',icon:I.layers},
    {id:'pines',   label:'Accesos PIN',icon:I.key},
  ];
  return (
    <div className="fade-up">
      <div style={{display:'flex',gap:6,marginBottom:22,flexWrap:'wrap'}}>
        {tabs.map(t=>(
          <button key={t.id} className={`btn ${tab===t.id?'btn-primary':'btn-ghost'}`} style={{fontSize:13,gap:5}} onClick={()=>setTab(t.id)}>
            {t.icon} {t.label}
          </button>
        ))}
      </div>
      {tab==='socios'    && <ConfigSocios/>}
      {tab==='proyectos' && <ConfigProyectos/>}
      {tab==='pines'     && <ConfigPins currentRol={currentRol}/>}
    </div>
  );
}

/* ══════════════════════════════════════════
   APP ROOT
══════════════════════════════════════════ */
function App() {
  const [user,setUser]           = useState(null);
  const [loginTime,setLoginTime] = useState(null);
  const [lastAct,setLastAct]     = useState(Date.now());
  const [warn,setWarn]           = useState(false);
  const [view,setView]           = useState('dashboard');
  const [rk,setRk]               = useState(0); // refresh key
  const [sideOpen,setSideOpen]   = useState(false);

  useEffect(()=>{ initDB(); const s=sessionStorage.getItem('al_session'); if(s){try{const d=JSON.parse(s);setUser(d.user);setLoginTime(d.t);}catch(e){}} },[]);

  useEffect(()=>{
    if(!user) return;
    const act=()=>setLastAct(Date.now());
    window.addEventListener('mousemove',act);
    window.addEventListener('click',act);
    window.addEventListener('touchstart',act,{passive:true});
    const iv=setInterval(()=>{
      const now=Date.now();
      const idle=(now-lastAct)/60000, sess=loginTime?(now-loginTime)/60000:0;
      setWarn(idle>55&&idle<=60);
      if(idle>60||sess>60) logout();
    },60000);
    return ()=>{ clearInterval(iv); window.removeEventListener('mousemove',act); window.removeEventListener('click',act); window.removeEventListener('touchstart',act); };
  },[user,lastAct,loginTime]);

  const login = u => {
    const t=Date.now(); setUser(u); setLoginTime(t); setLastAct(t);
    sessionStorage.setItem('al_session',JSON.stringify({user:u,t}));
    setView(u.rol==='asesor'?'registro':'dashboard');
  };
  const logout = ()=>{ setUser(null); setLoginTime(null); sessionStorage.removeItem('al_session'); setView('dashboard'); };
  const nav = id=>{ setView(id); setSideOpen(false); };

  if(!user) return <PinLogin onLogin={login}/>;

  const isAsesor = user.rol==='asesor';
  const navItems = isAsesor
    ? [{id:'registro',label:'Nueva Venta',icon:I.plus},{id:'reportes',label:'Mis Ventas',icon:I.table}]
    : [{id:'dashboard',label:'Inicio',icon:I.home},{id:'registro',label:'Nueva Venta',icon:I.plus},{id:'reportes',label:'Reportes',icon:I.table},{id:'config',label:'Config',icon:I.gear}];

  // Guard: asesor can't access dashboard/config
  const safeView = (isAsesor && (view==='dashboard'||view==='config')) ? 'registro' : view;

  const titles={dashboard:'Inicio',registro:'Nueva Venta',reportes:isAsesor?'Mis Ventas':'Reportes',config:'Configuración'};

  return (
    <div className="layout">
      {/* Sidebar backdrop (mobile) */}
      <div className={'backdrop'+(sideOpen?' open':'')} onClick={()=>setSideOpen(false)}/>

      {/* Sidebar */}
      <aside className={'sidebar'+(sideOpen?' open':'')}>
        <div style={{padding:'18px 16px',borderBottom:'1px solid var(--border)'}}>
          <Logo/>
        </div>
        <nav style={{padding:'10px 8px',flex:1,overflowY:'auto'}}>
          <p style={{fontSize:10,fontWeight:700,color:'var(--ink4)',letterSpacing:'.1em',padding:'4px 12px',textTransform:'uppercase',marginBottom:4}}>Menú</p>
          {navItems.map(n=>(
            <button key={n.id} className={'nav-item'+(safeView===n.id?' active':'')} onClick={()=>nav(n.id)}>
              {n.icon} {n.label}
            </button>
          ))}
        </nav>
        <div style={{padding:'10px 8px',borderTop:'1px solid var(--border)'}}>
          <div style={{padding:'10px 12px',borderRadius:var_r,background:'var(--surface)',border:'1px solid var(--border)',marginBottom:6,display:'flex',alignItems:'center',gap:9}}>
            <div style={{width:30,height:30,borderRadius:8,background:'var(--orange-lt)',display:'flex',alignItems:'center',justifyContent:'center',color:'var(--orange)',flexShrink:0}}>{I.user}</div>
            <div>
              <div style={{fontSize:13,fontWeight:700}}>{user.nombre}</div>
              <div style={{fontSize:11,color:'var(--ink3)'}}>{isAsesor?'Asesor':'Administrador'}</div>
            </div>
          </div>
          <button className="nav-item" onClick={logout} style={{color:'var(--red)'}}>{I.logout} Cerrar sesión</button>
        </div>
      </aside>

      {/* Mobile top bar */}
      <div className="topbar no-print">
        <button className="btn-icon" style={{color:'var(--ink)'}} onClick={()=>setSideOpen(true)}>{I.menu}</button>
        <Logo/>
        <div style={{width:32}}/>
      </div>

      {/* Main */}
      <main className="main">
        {/* Desktop header */}
        <div className="desktop-header" style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:24}}>
          <div>
            <h1>{titles[safeView]}</h1>
            <p style={{color:'var(--ink3)',fontSize:13,marginTop:3}}>{new Date().toLocaleDateString('es-PE',{weekday:'long',day:'numeric',month:'long',year:'numeric'})}</p>
          </div>
          <div style={{display:'flex',alignItems:'center',gap:10}}>
            {isAsesor&&<span className="badge badge-blue">Asesor</span>}
            {safeView!=='registro' && (
              <button className="btn btn-primary" style={{gap:6}} onClick={()=>nav('registro')}>
                {I.plus} Nueva Venta
              </button>
            )}
          </div>
        </div>

        {/* Mobile title */}
        <div className="mobile-title">{titles[safeView]}</div>

        {safeView==='dashboard' && <Dashboard onNav={nav} key={rk}/>}
        {safeView==='registro'  && <Registro onSaved={()=>setRk(k=>k+1)}/>}
        {safeView==='reportes'  && <Reportes key={rk} soloDosMeses={isAsesor} isAdmin={!isAsesor}/>}
        {safeView==='config'    && <Config currentRol={user.rol}/>}
      </main>

      {/* Mobile bottom nav */}
      <nav className="bottomnav no-print">
        {navItems.map(n=>(
          <button key={n.id} className={'bnav-btn'+(safeView===n.id?' active':'')} onClick={()=>nav(n.id)}>
            {React.cloneElement(n.icon,{width:20,height:20})}
            <span>{n.label}</span>
          </button>
        ))}
      </nav>

      {/* FAB — visible on mobile, hidden on registro view */}
      {safeView!=='registro' && (
        <button className="fab no-print" onClick={()=>nav('registro')} title="Nueva Venta">
          {React.cloneElement(I.plus,{width:24,height:24})}
        </button>
      )}

      {/* Inactivity bar */}
      {warn&&(
        <div className="inact-bar no-print">
          <span>Sesión expirará pronto por inactividad</span>
          <button onClick={()=>{setLastAct(Date.now());setWarn(false);}} style={{background:'rgba(255,255,255,.2)',border:'none',color:'#fff',padding:'6px 14px',borderRadius:8,cursor:'pointer',fontFamily:'Plus Jakarta Sans',fontWeight:600,fontSize:13}}>
            Mantener
          </button>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
